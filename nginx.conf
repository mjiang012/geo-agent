# GEO Agent Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/geo-agent
# 然后创建软链接：ln -s /etc/nginx/sites-available/geo-agent /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 前端静态文件
    location / {
        root /var/www/geo-agent/dist;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /var/www/geo-agent/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS 配置（使用 Certbot 自动配置）
# 运行：certbot --nginx -d your-domain.com
